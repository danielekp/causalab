# @package _global_
#
# country_borders — full geometry + manifold-steering pipeline.
#
# Runs the framework's *actual* steering method (path_steering: geodesic
# vs linear) through a fitted activation manifold of the relational Europe
# map, at the L28 last-token answer position studied in REPORT §6.
#
# Why this exists: REPORT §6.6 showed *linear* interchange at last_token is
# a bounded-negative. linear is path_steering's degenerate special case;
# the headline method is `geometric` (geodesic) steering along the fitted
# manifold. This pipeline runs both so the comparison is native and direct.
#
#   scripts/run_exp.sh country_borders/country_borders_8b_pipeline
#   # research session: add --experiment-root <session>/artifacts/...
#
defaults:
- /base
- /task: country_borders
- /model: llama31_8b
- /analysis/baseline
- /analysis/subspace
- /analysis/activation_manifold
- /analysis/output_manifold
- /analysis/path_steering
# - /analysis/pullback
- _self_

task:
  # per-answer-country centroids — the §6.2 relational map
  target_variable: country

locate:
  layers: [28]

subspace:
  # PCA-32 at L28 — the exact subspace REPORT §6.3/§6.6 used (continuity)
  layers: [28]
  k_features: 32
  token_positions: [last_token]

activation_manifold:
  layers: [28]
  token_positions: [last_token]
  # Data-driven manifold from centroid PCA (NOT graph_walk's canonical-θ
  # `parameter` mode — country has no analytic coordinate). intrinsic_dim 2
  # = the lat/lon plane established in §6.2 (PC0 R²0.77, PC1 R²0.83).
  intrinsic_mode: pca
  intrinsic_dim: 2

output_manifold:
  intrinsic_mode: pca
  intrinsic_dim: 2

path_steering:
  # geometric = geodesic along the fitted manifold; linear = the §6.6 baseline.
  path_modes: [geometric, linear]
  # First run: isometry only — the lowest-dependency criterion and the
  # headline "is geodesic a better-conditioned steering metric than linear?"
  # number. Expand to the full set once the wiring is confirmed on RunPod:
  #   eval_criteria: [isometry, coherence, distance_from_behavior_manifold]
  eval_criteria: [isometry]
  num_steps_along_path: 50
  # selected_pairs: null  -> unbiased random far/near pairs, full aggregate
  # isometry stats (the defensible headline). For the "does B appear at the
  # midpoint" visualization, set explicit far pairs from Stage A, e.g.:
  #   selected_pairs: [["Spain", "Russia"], ["Portugal", "Russia"]]
  # (note: explicit pairs disable aggregate stats — see path_steering.yaml)
  isometry:
    n_interior_per_pair: 4
