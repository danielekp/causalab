name: country_borders
max_new_tokens: 1
intervention_metric: string_match
# Default manifold-colouring map; resolved by analysis configs via
# ${task.colormap} (subspace / *_manifold / path_steering). colormap2 is
# the secondary map path_steering interpolates. Every task config must
# define these — see causalab/configs/analysis/subspace.yaml.
colormap: viridis
colormap2: null
n_train: 1000
n_test: 50
enumerate_all: true
balanced: false
# "all" = counterfactual resamples every input variable (task's generator).
# A variable name (e.g. "country") = CF differs from original only in that one
# variable. Required for locate pairwise mode. See ARCHITECTURE.md §5.
resample_variable: all
target_variable: country
# Manifold colours by the geographic intrinsic dim (country -> [lat, lon];
# 0 = latitude).
color_by_dim: 0
# --- activation_manifold / path_steering wiring -------------------------
# string_match stays the baseline accuracy metric (REPORT §6). The
# manifold/path-steering criteria compare the model's belief distribution
# over the 30 country first-tokens via `distance_function` (a categorical
# belief, same shape as months/weekdays/graph_walk).
reference_source: empirical
distance_function: hellinger
isometry:
  distance_function: ${task.distance_function}
  # country is parameterized by capital (lat, lon) — a real 2-D metric
  # space, but not a single scalar axis to bin, so no grid densification
  # (isometry.py guards on `grid_range is not None`; centroid-pair
  # distances are used directly).
  grid_range: null
  grid_resolution: null
  bin_positions: null
