# @package _global_
# #2 retrieval-vs-computation: identical to country_borders_subspace EXCEPT
# the features are read at the country (entity) token instead of last_token.
# Run into a SIBLING experiment-root so it does not clobber the relational
# (last_token) features:
#
#   bash scripts/run_exp.sh \
#     --experiment-root agent_logs/2026-05-13--nationality-geometry--clever-falcon/artifacts/country_borders/llama31_8b/_entitypos \
#     country_borders_subspace_entitypos
#
defaults:
  - /base
  - /task: country_borders
  - /model: llama31_8b
  - /analysis/subspace
  - _self_
task:
  enumerate_all: true
  target_variable: country
subspace:
  method: pca
  layers: [28]
  k_features: 32
  token_positions: [country]   # <-- the only change vs the relational run
  visualization:
    figure_format: png
