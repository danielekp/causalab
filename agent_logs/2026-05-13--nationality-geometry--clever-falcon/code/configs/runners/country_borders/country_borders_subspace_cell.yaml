# @package _global_
# One subspace cell for the layer sweep. layer + token position are supplied
# per-invocation as Hydra overrides by layer_sweep_driver.sh, e.g.:
#   bash scripts/run_exp.sh --experiment-root <cell_root> \
#        country_borders_subspace_cell \
#        'subspace.layers=[16]' 'subspace.token_positions=[country]'
# Defaults below are harmless placeholders (the relational L28 cell).
defaults:
  - /base
  - /task: country_borders
  - /model: llama31_8b
  - /analysis/subspace
  - _self_
task:
  enumerate_all: true
  target_variable: country
subspace:
  method: pca
  layers: [28]
  k_features: 32
  token_positions: [last_token]
  visualization:
    figure_format: png
